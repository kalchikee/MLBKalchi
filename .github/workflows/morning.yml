name: Morning Briefing (6 AM ET)

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 6:00 AM ET (EDT, Mar–Nov)
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to commit predictions/<date>.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today's date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Persistent DB — Elo ratings + bet history across days
      - name: Restore DB cache
        uses: actions/cache/restore@v4
        with:
          path: data/mlb_oracle.db
          key: mlb-oracle-db-${{ steps.date.outputs.date }}
          restore-keys: mlb-oracle-db-

      - name: Run pipeline + write predictions JSON + send morning Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          KALSHI_MIN_PROB: '0.58'
          DB_PATH: './data/mlb_oracle.db'
          CACHE_DIR: './cache'
          CACHE_TTL_HOURS: '1'
          LOG_LEVEL: 'info'
        run: node --loader ts-node/esm src/actions/morning.ts

      - name: Commit predictions JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions/${{ steps.date.outputs.date }}.json || true
          if ! git diff --staged --quiet; then
            git commit -m "MLB predictions ${{ steps.date.outputs.date }}"
            git push
          else
            echo "No predictions file to commit"
          fi

      - name: Save DB to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/mlb_oracle.db
          key: mlb-oracle-db-${{ steps.date.outputs.date }}
