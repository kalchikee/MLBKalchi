name: Position Monitor (1 PM – 11 PM ET)

on:
  schedule:
    - cron: '0 17 * * *'   # 17:00 UTC = 1:00 PM ET (EDT, Mar–Nov)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 600   # 10 hours — covers all game windows

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today's date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Restore DB written by morning job
      - name: Restore DB cache
        uses: actions/cache/restore@v4
        with:
          path: data/mlb_oracle.db
          key: mlb-oracle-db-${{ steps.date.outputs.date }}
          restore-keys: mlb-oracle-db-

      - name: Run position monitor (loops every 2 min until 11 PM ET)
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          KALSHI_PAPER_TRADING: 'true'
          KALSHI_CASHOUT_LOSS_PCT: '0.20'
          KALSHI_MONITOR_INTERVAL_MS: '120000'
          DB_PATH: './data/mlb_oracle.db'
          LOG_LEVEL: 'info'
        run: node --loader ts-node/esm src/actions/monitor.ts

      # Save updated DB (with stop-loss records) for EOD job
      - name: Save updated DB to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/mlb_oracle.db
          key: mlb-oracle-db-${{ steps.date.outputs.date }}
