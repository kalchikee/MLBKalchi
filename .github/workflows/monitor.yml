name: Position Monitor (1 PM – 11 PM ET, two shifts)

# GitHub Actions caps job runtime at 6 hours. The old 10-hour monitor was
# getting killed at 6h every day (17:00 UTC → 23:00 UTC = 1-7 PM ET),
# missing the last 4 hours of games. Now splits into two 5-hour shifts:
#   - Afternoon: 1 PM ET (17 UTC) → 6 PM ET (22 UTC)  — MONITOR_EXIT_HOUR=18
#   - Evening:   6 PM ET (22 UTC) → 11 PM ET (03 UTC next day) — MONITOR_EXIT_HOUR=23
on:
  schedule:
    - cron: '0 17 * * *'   # 17:00 UTC = 1:00 PM ET — afternoon shift
    - cron: '0 22 * * *'   # 22:00 UTC = 6:00 PM ET — evening shift
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5.5h — stays under the 6h GH Actions hard cap

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today's date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Restore DB written by morning job
      - name: Restore DB cache
        uses: actions/cache/restore@v4
        with:
          path: data/mlb_oracle.db
          key: mlb-oracle-db-${{ steps.date.outputs.date }}
          restore-keys: mlb-oracle-db-

      - name: Compute shift exit hour
        id: shift
        run: |
          H=$(TZ='America/New_York' date +%H)
          if [ "$H" -lt "18" ]; then
            echo "exit_hour=18" >> $GITHUB_OUTPUT  # afternoon: exit 6 PM ET
          else
            echo "exit_hour=23" >> $GITHUB_OUTPUT  # evening: exit 11 PM ET
          fi

      - name: Run position monitor (loops every 2 min until shift end)
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          KALSHI_PAPER_TRADING: 'true'
          KALSHI_CASHOUT_LOSS_PCT: '0.20'
          KALSHI_MONITOR_INTERVAL_MS: '120000'
          MONITOR_EXIT_HOUR: ${{ steps.shift.outputs.exit_hour }}
          DB_PATH: './data/mlb_oracle.db'
          LOG_LEVEL: 'info'
        run: node --loader ts-node/esm src/actions/monitor.ts

      # Save updated DB with a unique key so EOD job can restore it
      # (GitHub Actions cache keys are immutable — using run_id avoids collision with morning key)
      - name: Save updated DB to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/mlb_oracle.db
          key: mlb-oracle-db-${{ steps.date.outputs.date }}-monitor-${{ github.run_id }}
