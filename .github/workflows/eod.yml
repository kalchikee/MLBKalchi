name: EOD Summary (11 PM ET)

on:
  schedule:
    - cron: '0 3 * * *'    # 03:00 UTC = 11:00 PM ET (EDT, Mar–Nov)
  workflow_dispatch:

jobs:
  eod:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today's date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Restore DB — try monitor's updated copy first, fall back to morning's copy
      - name: Restore DB cache
        uses: actions/cache/restore@v4
        with:
          path: data/mlb_oracle.db
          key: mlb-oracle-db-${{ steps.date.outputs.date }}-monitor-
          restore-keys: |
            mlb-oracle-db-${{ steps.date.outputs.date }}-monitor-
            mlb-oracle-db-${{ steps.date.outputs.date }}
            mlb-oracle-db-

      # Restore safety-state — prefer monitor's (has latest stop-loss triggers)
      - name: Restore safety-state
        uses: actions/cache/restore@v4
        with:
          path: safety-state
          key: mlb-safety-state-${{ steps.date.outputs.date }}-monitor-
          restore-keys: |
            mlb-safety-state-${{ steps.date.outputs.date }}-monitor-
            mlb-safety-state-${{ steps.date.outputs.date }}
            mlb-safety-state-

      - name: Final position check + send EOD Discord summary
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          KALSHI_SAFETY_DISCORD_URL: ${{ secrets.KALSHI_SAFETY_DISCORD_URL }}
          KALSHI_PAPER_TRADING: 'true'
          KALSHI_CASHOUT_LOSS_PCT: '0.20'
          DB_PATH: './data/mlb_oracle.db'
          LOG_LEVEL: 'info'
        run: node --loader ts-node/esm src/actions/eod.ts

      # Save final DB for next day's morning job to restore (carries Elo forward)
      - name: Save final DB to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/mlb_oracle.db
          key: mlb-oracle-db-${{ steps.date.outputs.date }}-final

      # Save safety-state with yesterday's settled paper bets recorded
      - name: Save final safety-state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: safety-state
          key: mlb-safety-state-${{ steps.date.outputs.date }}-final
